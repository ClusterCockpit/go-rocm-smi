name: Go rocm-smi Build Tests

on:  
  push:
    tags:
      - '*'
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        golang-ver:
          - 1.25
    steps:
    - uses: actions/checkout@v3

    # libdrm is required by kfd_ioctl.h
    - name: Install libdrm-dev
      run: sudo apt install libdrm-dev

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{matrix.golang-ver}}

    - name: Install c-for-go
      run: |
         export PATH=$(go env GOTOOLDIR):$PATH
         go mod download github.com/NVIDIA/go-nvml
         go get github.com/xlab/c-for-go
         go install github.com/xlab/c-for-go
   
    - name: Get depdencies
      run: go get

    - name: Generate
      run: make

    - name: Build
      run: make build
  
